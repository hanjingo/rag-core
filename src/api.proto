syntax = "proto3";
package GrpcLibrary;

service GrpcService {
    rpc Heartbeat (Ping) returns (Pong) {}
    rpc Login (LoginReq) returns (LoginResp) {}
    rpc Logout (LogoutReq) returns (LogoutResp) {}
    rpc RegAccount (RegAccountReq) returns (RegAccountResp) {}
    rpc Query (QueryReq) returns (stream QueryResp) {}
    rpc StopAnswer (StopAnswerReq) returns (StopAnswerResp) {}
    rpc GetMessageInfo (GetMessageInfoReq) returns (GetMessageInfoResp) {}
    rpc GetSession (GetSessionReq) returns (GetSessionResp) {}
    rpc NewSession (NewSessionReq) returns (NewSessionResp) {}
    rpc ModifySessionTitle (ModifySessionTitleReq) returns (ModifySessionTitleResp) {}
    rpc DelSession (DelSessionReq) returns (DelSessionResp) {}
    rpc GetSkillInfo (GetSkillInfoReq) returns (GetSkillInfoResp) {}
    rpc Download (DownloadReq) returns (DownloadResp) {}
}

message Session {
    int64 id = 1;
    int64 user_id = 2;
    string title = 3;
    string timestamp = 4;
}

message Skill {
    string hash = 1;
    string name = 2;
    string desc = 3;
    string publisher = 4;
    string version = 5;
    string timestamp = 6;
    int32 platform = 7;
}

message MessageInfo {
    int64 id = 1;
    int64 session_id = 2;
    string role = 3;
    string content = 4;
    int64 prev_message_id = 5;
    string timestamp = 6;
}

message SamplingParam {
    float repetition_penalty = 1;
    float temperature = 2;
    float top_k = 3;
    float top_p = 4;
    float min_p = 5;
}

message ContextParam {
    int32 window_size = 1;
    string stop_words = 2;
}

message Ping {
    int64 timestamp = 1;
}

message Pong {
    int64 timestamp = 1;
}

message LoginReq {
    string account = 1;
    string passwd = 2;
}

message LoginResp {
    int32 error_code = 1;
    int64 user_id = 2;
    int32 privilege = 3;
    string auth = 4;
    string account = 5;
    string last_login_time = 6;
}

message LogoutReq {
    int64 user_id = 1;
    string auth = 2;
}

message LogoutResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message RegAccountReq {
    string account = 1;
    string passwd = 2;
}

message RegAccountResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message QueryReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth = 3;
    string content = 4;
    string model = 5;
    string pipeline = 6;
    SamplingParam sampling = 7;
    ContextParam ctx = 8;
}

message QueryResp {
    int32 error_code = 1;
    int64 id = 2;
    string content = 3;
    bool is_finished = 4;
}

message StopAnswerReq {
    int64 session_id = 1;
    int64 user_id = 2;
    string auth = 3;
}

message StopAnswerResp {
    int32 error_code = 1;
    int64 session_id = 2;
}

message GetMessageInfoReq {
    int64 id = 1;
    int64 session_id = 2;
    int32 limit = 3;
    int64 user_id = 4;
    string auth = 5;
}

message GetMessageInfoResp {
    int32 error_code = 1;
    repeated MessageInfo messages = 2;
}

message GetSessionReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    int32 limit = 4;
}

message GetSessionResp {
    int32 error_code = 1;
    repeated Session sessions = 2;
}

message NewSessionReq {
    int64 user_id = 1;
    string auth = 2;
    string title = 3;
    string content = 4;
    string model = 5;
}

message NewSessionResp {
    int32 error_code = 1;
    Session session = 2;
}

message ModifySessionTitleReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    string title = 4;
}

message ModifySessionTitleResp {
    int32 error_code = 1;
    int64 id = 2;
    string title = 3;
}

message DelSessionReq {
    int64 user_id = 1;
    string auth = 2;
    repeated int64 ids = 3;
}

message DelSessionResp {
    int32 error_code = 1;
    repeated int64 ids = 2;
}

message GetSkillInfoReq {
    string hash = 1;
    int32 limit = 2;
}

message GetSkillInfoResp {
    int32 error_code = 1;
    repeated Skill skills = 2;
}

message DownloadReq {
    string hash = 1;
    int64 user_id = 2;
    string auth = 3;
}

message DownloadResp {
    int32 error_code = 1;
    string hash = 2;
    string addr = 3;
    int64 size_kb = 4;
}