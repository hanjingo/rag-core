syntax = "proto3";
package GrpcLibrary;

service GrpcService {
    rpc Login (LoginReq) returns (LoginResp) {}
    rpc Logout (LogoutReq) returns (LogoutResp) {}
    rpc RegAccount (RegAccountReq) returns (RegAccountResp) {}
    rpc Query (QueryReq) returns (QueryResp) {}
    rpc GetSession (GetSessionReq) returns (GetSessionResp) {}
    rpc NewSession (NewSessionReq) returns (NewSessionResp) {}
    rpc ModifySessionTitle (ModifySessionTitleReq) returns (ModifySessionTitleResp) {}
    rpc GetModelInfo (GetModelInfoReq) returns (GetModelInfoResp) {}
    rpc NewModelInfo (NewModelInfoReq) returns (NewModelInfoResp) {}
    rpc GetSkillInfo (GetSkillInfoReq) returns (GetSkillInfoResp) {}
    rpc Download (DownloadReq) returns (DownloadResp) {}
}

message Session {
    int64 id = 1;
    int64 user_id = 2;
    string title = 3;
    string content = 4;
    string timestamp = 5;
}

message Model {
    string hash = 1;
    string name = 2;
    string publisher = 3;
    string timestamp = 4;
    string addr = 5;
    string capabilities = 6;
    int64 context_size = 7;
    int32 cost = 8;
}

message Skill {
    string hash = 1;
    string name = 2;
    string desc = 3;
    string publisher = 4;
    string version = 5;
    string timestamp = 6;
    int32 platform = 7;
}

message LoginReq {
    string account = 1;
    string passwd = 2;
}

message LoginResp {
    int32 error_code = 1;
    int64 user_id = 2;
    int32 privilege = 3;
    string auth = 4;
    string account = 5;
    string last_login_time = 6;
}

message LogoutReq {
    int64 user_id = 1;
    string auth = 2;
}

message LogoutResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message RegAccountReq {
    string account = 1;
    string passwd = 2;
}

message RegAccountResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message QueryReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth = 3;
    string content = 4;
    string model = 5;
}

message QueryResp {
    int32 error_code = 1;
    int64 id = 2;
    string content = 3;
}

message GetSessionReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    int32 limit = 4;
}

message GetSessionResp {
    int32 error_code = 1;
    repeated Session sessions = 2;
}

message NewSessionReq {
    int64 user_id = 1;
    string auth = 2;
    string title = 3;
    string content = 4;
    string model = 5;
}

message NewSessionResp {
    int32 error_code = 1;
    Session session = 2;
}

message ModifySessionTitleReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    string title = 4;
}

message ModifySessionTitleResp {
    int32 error_code = 1;
    int64 id = 2;
    string title = 3;
}

message GetModelInfoReq {
    string hash = 1;
    int64 user_id = 2;
    string auth =3;
    int32 limit = 4;
}

message GetModelInfoResp {
    int32 error_code = 1;
    repeated Model models = 2;
}

message NewModelInfoReq {
    int64 user_id = 1;
    string auth = 2;
    repeated Model models = 3;
}

message NewModelInfoResp {
    int32 error_code = 1;
    repeated string hashs = 2;
} 

message GetSkillInfoReq {
    string hash = 1;
    int32 limit = 2;
}

message GetSkillInfoResp {
    int32 error_code = 1;
    repeated Skill skills = 2;
}

message DownloadReq {
    string hash = 1;
    int64 user_id = 2;
    string auth = 3;
}

message DownloadResp {
    int32 error_code = 1;
    string hash = 2;
    string addr = 3;
    int64 size_kb = 4;
}