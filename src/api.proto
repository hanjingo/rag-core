syntax = "proto3";
package GrpcLibraryV1;

service GrpcService {
    rpc Heartbeat (Ping) returns (Pong) {}
    rpc Login (LoginReq) returns (LoginResp) {}
    rpc Logout (LogoutReq) returns (LogoutResp) {}
    rpc RegAccount (RegAccountReq) returns (RegAccountResp) {}
    rpc Query (QueryReq) returns (stream QueryResp) {}
    rpc StopAnswer (StopAnswerReq) returns (StopAnswerResp) {}
    rpc Recognize(stream RecognizeReq) returns (stream RecognizeResp) {}
    rpc StopRecognize (StopRecognizeReq) returns (StopRecognizeResp) {}
    rpc GetMessageInfo (GetMessageInfoReq) returns (GetMessageInfoResp) {}
    rpc GetSession (GetSessionReq) returns (GetSessionResp) {}
    rpc NewSession (NewSessionReq) returns (NewSessionResp) {}
    rpc ModifySessionTitle (ModifySessionTitleReq) returns (ModifySessionTitleResp) {}
    rpc DelSession (DelSessionReq) returns (DelSessionResp) {}
    rpc GetPluginInfo (GetPluginInfoReq) returns (GetPluginInfoResp) {}
    rpc Download (DownloadReq) returns (DownloadResp) {}
    rpc Upload (UploadReq) returns (UploadResp) {}
    rpc Embedding (stream EmbeddingReq) returns (stream EmbeddingResp) {}
    rpc StopEmbedding (StopEmbeddingReq) returns (StopEmbeddingResp) {}
}

message Session {
    int64 id = 1;
    int64 user_id = 2;
    string title = 3;
    string timestamp = 4;
}

message Plugin {
    string hash = 1;
    string name = 2;
    string desc = 3;
    string publisher = 4;
    string version = 5;
    string timestamp = 6;
    int32 platform = 7;
}

message MessageInfo {
    int64 id = 1;
    int64 session_id = 2;
    string role = 3;
    string content = 4;
    int64 prev_message_id = 5;
    string timestamp = 6;
}

message SamplingParam {
    int32 penalty_last_n = 1;
    float penalty_repeat = 2;
    float penalty_freq = 3;
    float penalty_present = 4;
    float temperature = 5;
    float temperature_ext = 6;
    float temperature_ext_delta = 7;
    float temperature_ext_exponent = 8;
    uint32 seed = 9;
    int32 top_k = 10;
    float top_p = 11;
    int32 top_p_min_keep = 12;
    float min_p = 13;
    int32 min_p_min_keep = 14;
}

message ContextParam {
    int32 window_size = 1;
    string stop_words = 2;

    int32 n_ctx = 3;
    int32 n_batch = 4;
    int32 n_ubatch = 5;
    int32 n_seq_max = 6;
    int32 n_threads = 7;
    int32 n_threads_batch = 8;

    float rope_freq_base = 9;
    float rope_freq_scale = 10;
    float yarn_ext_factor = 11;
    float yarn_attn_factor = 12;
    float yarn_beta_fast = 13;
    float yarn_beta_slow = 14;
    int32 yarn_orig_ctx = 15;
    float defrag_thold = 16;

    bool embeddings = 17;
    bool offload_kqv = 18;
    bool no_perf = 19;
    bool op_offload = 20;
    bool swa_full = 21;
    bool kv_unified = 22;

    string prompt = 23;
}

message RecognitionParam {
    int32 n_threads = 1;
    int32 n_max_text_ctx = 2;
    int32 offset_ms = 3;
    int32 duration_ms = 4;
    bool translate = 5;
    bool detect_language = 6;
    string language = 7;
    bool no_ctx = 8;
    bool no_timestamps = 9;
    bool single_segment = 10;
    bool print_special = 11;
    bool print_progress = 12;
    bool print_realtime = 13;
    bool print_timestamps = 14;
    bool carry_initial_prompt = 15;
    string initial_prompt = 16;
    string suppress_regex = 17;
    bool suppress_blank = 18;
    bool suppress_nst = 19;
    float temperature = 20;
    float temperature_inc = 21;
    float max_initial_ts = 22;
    float length_penalty = 23;
    float entropy_thold = 24;
    float logprob_thold = 25;
    float no_speech_thold = 26;
}

message EmbeddingParam {
    int32 dimension = 1;
}

message FileChunk {
    int64 id = 1;
    bytes data = 2;
    int64 start_pos = 3;
    int64 end_pos = 4;
    string filename = 5;
}

message UpdateInfo {
    bool force_update = 1;
}

message Ping {
    int64 timestamp = 1;
}

message Pong {
    int64 timestamp = 1;
}

message LoginReq {
    string account = 1;
    string passwd = 2;

    string platform = 3;
    string arch = 4;
    string client_version = 5;
}

message LoginResp {
    int32 error_code = 1;
    int64 user_id = 2;
    int32 privilege = 3;
    string auth = 4;
    string account = 5;
    string last_login_time = 6;

    UpdateInfo update_info = 7;
}

message LogoutReq {
    int64 user_id = 1;
    string auth = 2;
}

message LogoutResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message RegAccountReq {
    string account = 1;
    string passwd = 2;
}

message RegAccountResp {
    int32 error_code = 1;
    int64 user_id = 2;
}

message QueryReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth = 3;
    string content = 4;
    string model = 5;
    string pipeline = 6;
    string api_key = 7;
    SamplingParam sampling = 8;
    ContextParam ctx = 9;
}

message QueryResp {
    int32 error_code = 1;
    int64 id = 2;
    string content = 3;
    bool is_finished = 4;
}

message StopAnswerReq {
    int64 session_id = 1;
    int64 user_id = 2;
    string auth = 3;
}

message StopAnswerResp {
    int32 error_code = 1;
    int64 session_id = 2;
}

message RecognizeReq {
    string ctx_id = 1;
    int64 session_id = 2;
    oneof request_type {
        RecognitionParam param = 3;
        bytes audio_chunk = 4;
    }
}

message RecognizeResp {
    int32 error_code = 1;
    int64 session_id = 2;
    string transcript = 3;
    bool is_finished = 4;
    double confidence = 5;
}

message StopRecognizeReq {
    int64 session_id = 1;
    int64 user_id = 2;
    string auth = 3;
}

message StopRecognizeResp {
    int32 error_code = 1;
    int64 session_id = 2;
}

message GetMessageInfoReq {
    int64 id = 1;
    int64 session_id = 2;
    int32 limit = 3;
    int64 user_id = 4;
    string auth = 5;
}

message GetMessageInfoResp {
    int32 error_code = 1;
    repeated MessageInfo messages = 2;
}

message GetSessionReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    int32 limit = 4;
}

message GetSessionResp {
    int32 error_code = 1;
    repeated Session sessions = 2;
}

message NewSessionReq {
    int64 user_id = 1;
    string auth = 2;
    string title = 3;
    string content = 4;
    string model = 5;
}

message NewSessionResp {
    int32 error_code = 1;
    Session session = 2;
}

message ModifySessionTitleReq {
    int64 id = 1;
    int64 user_id = 2;
    string auth =3;
    string title = 4;
}

message ModifySessionTitleResp {
    int32 error_code = 1;
    int64 id = 2;
    string title = 3;
}

message DelSessionReq {
    int64 user_id = 1;
    string auth = 2;
    repeated int64 ids = 3;
}

message DelSessionResp {
    int32 error_code = 1;
    repeated int64 ids = 2;
}

message GetPluginInfoReq {
    string hash = 1;
    string publisher = 2;
    int32 limit = 3;
}

message GetPluginInfoResp {
    int32 error_code = 1;
    repeated Plugin plugins = 2;
}

message DownloadReq {
    string hash = 1;
    int64 user_id = 2;
    string auth = 3;
}

message DownloadResp {
    int32 error_code = 1;
    string hash = 2;
    string addr = 3;
    int64 size_kb = 4;
}

message UploadReq {
    string hash = 1;
    int64 user_id = 2;
    string auth = 3;
    string addr = 4;
    int64 size_kb = 5;
}

message UploadResp {
    int32 error_code = 1;
    string hash = 2;
}

message EmbeddingReq {
    int64 task_id = 1;
    oneof request_type {
        EmbeddingParam param = 2;
        FileChunk chunk = 3;
    }
}

message EmbeddingResp {
    int32 error_code = 1;
    int64 task_id = 2;
    int64 chunk_id = 3;
    bytes vector_indexs = 4;
}

message StopEmbeddingReq {
    int64 task_id = 1;
    int64 user_id = 2;
    string auth = 3;
}

message StopEmbeddingResp {
    int32 error_code = 1;
    int64 task_id = 2;
}