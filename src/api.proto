syntax = "proto3";
package GrpcLibrary;

service GrpcService {
    rpc Query (QueryReq) returns (QueryResp) {}
    rpc GetSession (GetSessionReq) returns (GetSessionResp) {}
    rpc NewSession (NewSessionReq) returns (NewSessionResp) {}
    rpc ModifySessionTitle (ModifySessionTitleReq) returns (ModifySessionTitleResp) {}
    rpc GetSkillInfo (GetSkillInfoReq) returns (GetSkillInfoResp) {}
    rpc Download (DownloadReq) returns (DownloadResp) {}
}

message Session {
    int64 id = 1;
    int32 user_id = 2;
    string title = 3;
    string content = 4;
    string timestamp = 5;
    string vector_index = 6;
}

message Skill {
    int64 id = 1;
    string name = 2;
    string desc = 3;
    string publisher = 4;
    string version = 5;
    string timestamp = 6;
    string hash = 7;
}

message QueryReq {
    int64 id = 1;
    int32 user_id = 2;
    string auth = 3;
    string content = 4;
}

message QueryResp {
    int32 error_code = 1;
    int64 id = 2;
    string content = 3;
}

message GetSessionReq {
    int64 id = 1;
    int32 user_id = 2;
    string auth =3;
    int32 limit = 4;
}

message GetSessionResp {
    int32 error_code = 1;
    repeated Session sessions = 2;
}

message NewSessionReq {
    int32 user_id = 1;
    string auth = 2;
    string title = 3;
}

message NewSessionResp {
    int32 error_code = 1;
    Session session = 2;
}

message ModifySessionTitleReq {
    int64 id = 1;
    int32 user_id = 2;
    string auth =3;
    string title = 4;
}

message ModifySessionTitleResp {
    int32 error_code = 1;
    int64 id = 2;
    string title = 3;
}

message GetSkillInfoReq {
    int64 id = 1;
    int32 limit = 2;
}

message GetSkillInfoResp {
    int32 error_code = 1;
    repeated Skill skills = 2;
}

message DownloadReq {
    string hash = 1;
    int32 user_id = 2;
    string auth = 3;
}

message DownloadResp {
    int32 error_code = 1;
    string hash = 2;
    string addr = 3;
    int64 size_kb = 4;
}