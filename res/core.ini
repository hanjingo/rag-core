[log]
min_lvl=0
flush_on=0
filename=log/core.log
max_size=2
max_files=10

[server]
addr=127.0.0.1:50051

[sqlite]
id=sqlite
path=./core.db
pool=1
msg_limit=1000

[issuer]
id=issuer
algo=0
pub_key=
pri_key=
encrypted_pub_key=
encrypted_pri_key=
valid_times=10000
leeway=30

[verifier]
id=verifier
algo=0
pub_key=
pri_key=
encrypted_pub_key=
encrypted_pri_key=

[llm]
ctx_window_sz = 4096
num_threads = 1
models = TinyStories-656K-Q3_K_M;Qwen3-8B-Q8_0;Qwen3-Embedding-0.6B-Q8_0

[TinyStories-656K-Q3_K_M]
path = ./models/TinyStories-656K-Q3_K_M.gguf
n_gpu_layers = -1

[Qwen3-8B-Q8_0]
path = ./models/Qwen3-8B-Q8_0.gguf
n_gpu_layers = -1

[Qwen3-Embedding-0.6B-Q8_0]
path = ./models/Qwen3-Embedding-0.6B-Q8_0.gguf
n_gpu_layers = -1